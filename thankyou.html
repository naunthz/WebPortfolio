<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You - Nathan Portfolio</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --panel: rgba(13, 24, 43, 0.88);
      --text: #f4f7fb;
      --muted: #aab7c6;
      --accent: #7dd3fc;
      --accent-2: #38bdf8;
      --border: rgba(125, 211, 252, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.24), transparent 35%),
        radial-gradient(circle at bottom right, rgba(125, 211, 252, 0.16), transparent 28%),
        linear-gradient(160deg, #050913 0%, var(--bg) 100%);
      padding: 24px;
    }

    .card {
      width: min(100%, 560px);
      padding: 40px 28px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin-bottom: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #03111f;
      font-size: 2rem;
      font-weight: 700;
      box-shadow: 0 12px 30px rgba(56, 189, 248, 0.35);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .actions {
      margin-top: 28px;
    }

    a {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 999px;
      text-decoration: none;
      color: #04111f;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 22px rgba(56, 189, 248, 0.25);
    }

    a:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 26px rgba(56, 189, 248, 0.32);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">✓</div>
    <h1>Pesan berhasil terkirim</h1>
    <p>Terima kasih sudah menghubungi Nathan Portfolio. Pesan kamu sudah masuk dan akan dibaca secepatnya.</p>
    <div class="actions">
      <a href="portfolionathan.html">Kembali ke portfolio</a>
    </div>
  </main>
</body>
</html>
